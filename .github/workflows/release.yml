name: Release

on:
  push:
    branches: [main]

# Only one release runs at a time. If a newer commit arrives while a release
# is in progress, the current run finishes — not cancelled — so the publish
# and tag always complete cleanly. The next queued run will then compute the
# version from the commits that arrived in the meantime.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Version, Tag & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history required for conventional commits parsing

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      # Computes the next SemVer from conventional commits since the last tag.
      #
      # Bump rules (squash-merge PR title as conventional commit):
      #   feat!: / BREAKING CHANGE: → major  (0.1.0 → 1.0.0)
      #   feat:                     → minor  (0.0.1 → 0.1.0)
      #   fix: / build: / chore:    → patch  (0.1.0 → 0.1.1)
      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          tag_prefix: v

      - name: Print version decision
        run: |
          echo "Previous tag : ${{ steps.tag.outputs.previous_tag }}"
          echo "New version  : ${{ steps.tag.outputs.new_version }}"
          echo "New tag      : ${{ steps.tag.outputs.new_tag }}"
          echo "Bump type    : ${{ steps.tag.outputs.release_type }}"

      # Single gate that decides whether the rest of the job should run.
      # A step's `exit 0` only ends THAT step — subsequent steps still execute.
      # So we compute the decision once here, emit it as an output, and gate
      # every later step on `if: steps.gate.outputs.should_release == 'true'`.
      #
      # Conditions for releasing:
      #   - there are releasable commits since the last tag (new_tag != previous_tag)
      #   - the computed tag does not already exist locally (safety net against
      #     concurrent runs that compute the same version before one has tagged)
      - name: Determine release eligibility
        id: gate
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          PREV_TAG="${{ steps.tag.outputs.previous_tag }}"

          if [ "$NEW_TAG" = "$PREV_TAG" ]; then
            echo "No releasable commits since last tag — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # `git rev-parse --verify` does a literal ref lookup; safer than
          # `grep -qx "$NEW_TAG"` which would treat `$NEW_TAG` as a regex (e.g.
          # `v1.2.3` would match an unrelated tag like `v1a2b3` because `.` is
          # a wildcard).
          if git rev-parse -q --verify "refs/tags/$NEW_TAG" >/dev/null; then
            echo "Tag $NEW_TAG already exists — this version was already released. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Tag $NEW_TAG does not exist yet — proceeding with release."
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      # The action is the single source of truth for the version.
      # All version references across the repo are updated atomically here.
      # The version bump commit is pushed to main only AFTER build and publish
      # succeed, so main is never left in a bumped-but-unreleased state.
      # [skip ci] in the commit message prevents this push from triggering
      # another release run — the actual loop-prevention mechanism.
      - name: Update version in all files
        if: steps.gate.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          TAG="${{ steps.tag.outputs.new_tag }}"

          # Build configuration — version used by Gradle / Maven publish
          sed -i -E "s/^version=.*/version=${VERSION}/" gradle.properties

          # Landing page (docs/index.html) — targeted replacements so the Tessera
          # version ref ("v0.0.6" in the tech-stack) is NOT clobbered by a blanket
          # vX.Y.Z replace. Each pattern matches a specific structural context.
          sed -i -E "s,(<span class=\"badge\">)v[0-9]+\.[0-9]+\.[0-9]+(</span>),\1${TAG}\2," docs/index.html
          sed -i -E "s/mosaic-core-v[0-9]+\.[0-9]+\.[0-9]+/mosaic-core-${TAG}/g" docs/index.html
          sed -i -E "s/>v[0-9]+\.[0-9]+\.[0-9]+ · Tessera/>${TAG} · Tessera/g" docs/index.html

          # Root README — JitPack snippet and GitHub Packages Maven coordinate
          sed -i -E "s/mosaic-core-v[0-9]+\.[0-9]+\.[0-9]+/mosaic-core-${TAG}/g" README.md
          sed -i -E "s/mosaic-core:[0-9]+\.[0-9]+\.[0-9]+/mosaic-core:${VERSION}/g" README.md

          # mosaic-core README — same install snippets
          sed -i -E "s/mosaic-core-v[0-9]+\.[0-9]+\.[0-9]+/mosaic-core-${TAG}/g" mosaic-core/README.md
          sed -i -E "s/mosaic-core:[0-9]+\.[0-9]+\.[0-9]+/mosaic-core:${VERSION}/g" mosaic-core/README.md

          echo "All version references updated to ${TAG} / ${VERSION}"

      - name: Stage version bump commit (local only)
        if: steps.gate.outputs.should_release == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties docs/index.html README.md mosaic-core/README.md
          if git diff --cached --quiet; then
            echo "No file changes — nothing to commit."
          else
            git commit -m "chore: release ${{ steps.tag.outputs.new_tag }} [skip ci]"
            echo "Version bump committed locally."
          fi

      - name: Build & verify
        if: steps.gate.outputs.should_release == 'true'
        run: ./gradlew build koverVerify

      # GitHub Packages does not allow overwriting a published version (HTTP 409).
      # A previous run may have published the Maven artifact but failed before
      # creating the git tag, leaving the repo in a partially-released state.
      # Treating 409 as success lets the pipeline complete (tag + release) even
      # when the artifact was already uploaded by an earlier interrupted run.
      - name: Publish to GitHub Packages
        if: steps.gate.outputs.should_release == 'true'
        run: |
          set +e
          ./gradlew :mosaic-core:publishMavenPublicationToGitHubPackagesRepository \
            2>&1 | tee /tmp/publish.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            if grep -q "409" /tmp/publish.log; then
              echo "::warning::Version ${{ steps.tag.outputs.new_version }} is already present in GitHub Packages (HTTP 409)."
              echo "This means a previous run published the artifact but failed before creating the git tag."
              echo "Continuing to create the git tag and GitHub Release."
            else
              echo "::error::Publish failed with an unexpected error (not 409)."
              cat /tmp/publish.log
              exit 1
            fi
          else
            echo "Published dev.mosaic:mosaic-core:${{ steps.tag.outputs.new_version }} successfully."
          fi
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push only after build and publish succeed. [skip ci] in the commit
      # message prevents this push from triggering a new release workflow run.
      - name: Push version bump to main
        if: steps.gate.outputs.should_release == 'true'
        run: |
          if ! git diff --quiet HEAD origin/main; then
            git push origin main
            echo "Version bump pushed to main."
          else
            echo "Nothing to push."
          fi

      - name: Create git tag
        if: steps.gate.outputs.should_release == 'true'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub Release
        if: steps.gate.outputs.should_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generateReleaseNotes: false
          makeLatest: true
